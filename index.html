<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>インベーダーゲーム</title>
  <style>
    body {
      margin: 0;
      background-color: #000;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      touch-action: none; /* スワイプによる画面スクロールを防止 */
    }
    canvas {
      background-color: #111;
      margin-top: 10px;
    }
    #controls {
      display: flex;
      gap: 15px;
      margin-top: 20px;
    }
    button {
      padding: 15px 30px;
      font-size: 24px;
      background-color: #333;
      color: #0f0;
      border: 2px solid #0f0;
      border-radius: 8px;
      user-select: none;
    }
    button:active { background-color: #0f0; color: #000; }
  </style>
</head>
<body>

  <canvas id="gameCanvas" width="300" height="400"></canvas>
  
  <div id="controls">
    <button id="btnLeft">◀</button>
    <button id="btnFire">発射</button>
    <button id="btnRight">▶</button>
  </div>

<script>
  const canvas = document.getElementById("gameCanvas");
  const ctx = canvas.getContext("2d");

  // ゲームの変数の設定
  let player = { x: 135, y: 360, width: 30, height: 20, speed: 5, dx: 0 };
  let bullets = [];
  let enemies = [];
  let score = 0;
  let gameOver = false;

  // 敵の生成
  function initEnemies() {
    enemies = [];
    for (let row = 0; row < 4; row++) {
      for (let col = 0; col < 6; col++) {
        enemies.push({ x: 20 + col * 40, y: 30 + row * 30, width: 25, height: 15, status: 1 });
      }
    }
  }
  initEnemies();

  // スマホボタンの操作イベント
  document.getElementById("btnLeft").addEventListener("touchstart", (e) => { e.preventDefault(); player.dx = -player.speed; });
  document.getElementById("btnLeft").addEventListener("touchend", (e) => { e.preventDefault(); player.dx = 0; });
  
  document.getElementById("btnRight").addEventListener("touchstart", (e) => { e.preventDefault(); player.dx = player.speed; });
  document.getElementById("btnRight").addEventListener("touchend", (e) => { e.preventDefault(); player.dx = 0; });

  document.getElementById("btnFire").addEventListener("touchstart", (e) => { 
    e.preventDefault(); 
    if(!gameOver) bullets.push({ x: player.x + player.width / 2 - 2, y: player.y, width: 4, height: 10, speed: 7 }); 
    else { gameOver = false; score = 0; initEnemies(); update(); } // ゲームオーバー時はリスタート
  });

  // PCキーボードの操作イベント
  document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowLeft") player.dx = -player.speed;
    if (e.key === "ArrowRight") player.dx = player.speed;
    if (e.key === " " || e.key === "ArrowUp") {
      if(!gameOver) bullets.push({ x: player.x + player.width / 2 - 2, y: player.y, width: 4, height: 10, speed: 7 });
    }
  });
  document.addEventListener("keyup", (e) => {
    if (e.key === "ArrowLeft" || e.key === "ArrowRight") player.dx = 0;
  });

  // 描画と更新ループ
  function update() {
    if (gameOver) {
      ctx.fillStyle = "white";
      ctx.font = "24px Arial";
      ctx.fillText("GAME OVER", 80, 200);
      ctx.fillText("TAP FIRE TO RESTART", 25, 240);
      return;
    }

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // プレイヤーの移動と描画
    player.x += player.dx;
    if (player.x < 0) player.x = 0;
    if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;
    ctx.fillStyle = "#0f0";
    ctx.fillRect(player.x, player.y, player.width, player.height);

    // 弾の移動と描画
    ctx.fillStyle = "#ff0";
    bullets.forEach((bullet, bIndex) => {
      bullet.y -= bullet.speed;
      ctx.fillRect(bullet.x, bullet.y, bullet.width, bullet.height);
      if (bullet.y < 0) bullets.splice(bIndex, 1);
    });

    // 敵の移動、描画、当たり判定
    let allDead = true;
    ctx.fillStyle = "#f00";
    enemies.forEach((enemy) => {
      if (enemy.status === 1) {
        allDead = false;
        enemy.y += 0.2; // 敵がゆっくり降りてくる
        ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);

        // ゲームオーバー判定（敵が下まで来た）
        if (enemy.y + enemy.height > player.y) gameOver = true;

        // 弾との当たり判定
        bullets.forEach((bullet, bIndex) => {
          if (bullet.x > enemy.x && bullet.x < enemy.x + enemy.width &&
              bullet.y > enemy.y && bullet.y < enemy.y + enemy.height) {
            enemy.status = 0;
            bullets.splice(bIndex, 1);
            score += 10;
          }
        });
      }
    });

    // クリア判定
    if (allDead) initEnemies();

    // スコアの描画
    ctx.fillStyle = "white";
    ctx.font = "16px Arial";
    ctx.fillText("SCORE: " + score, 10, 20);

    requestAnimationFrame(update);
  }

  update();
</script>
</body>
</html>
